Fcircle>\n          <circle cx=\"68\" cy=\"24\" r=\"2.5\" fill=\"#000\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <!-- Palm 2 (mid, smaller) -->\n      <div class=\"palm palm-2\">\n        <svg viewBox=\"0 0 110 220\" preserveAspectRatio=\"xMidYMax meet\">\n          <path d=\"M52,220 C50,170 56,120 56,70 C56,40 54,20 52,8\" stroke=\"#020108\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <g stroke=\"#0a0612\" stroke-width=\"1\" opacity=\"0.6\">\n            <line x1=\"46\" y1=\"190\" x2=\"58\" y2=\"188\"><\u002Fline>\n            <line x1=\"48\" y1=\"160\" x2=\"60\" y2=\"158\"><\u002Fline>\n            <line x1=\"50\" y1=\"130\" x2=\"60\" y2=\"128\"><\u002Fline>\n            <line x1=\"51\" y1=\"100\" x2=\"61\" y2=\"98\"><\u002Fline>\n            <line x1=\"52\" y1=\"70\" x2=\"60\" y2=\"68\"><\u002Fline>\n          <\u002Fg>\n          <g fill=\"#000\" stroke=\"#000\" stroke-linejoin=\"round\">\n            <path d=\"M52,10 C32,2 12,6 0,24 C18,16 36,16 50,22 Z\"><\u002Fpath>\n            <path d=\"M52,10 C72,2 96,8 108,28 C90,18 70,18 56,24 Z\"><\u002Fpath>\n            <path d=\"M52,10 C40,16 24,34 14,60 C32,42 46,32 52,26 Z\"><\u002Fpath>\n            <path d=\"M52,10 C66,16 84,36 96,64 C78,46 62,34 54,26 Z\"><\u002Fpath>\n            <path d=\"M52,10 C46,28 42,52 42,80 C50,58 52,40 54,26 Z\"><\u002Fpath>\n          <\u002Fg>\n          <circle cx=\"52\" cy=\"16\" r=\"2.5\" fill=\"#000\"><\u002Fcircle>\n          <circle cx=\"56\" cy=\"18\" r=\"2.5\" fill=\"#000\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <!-- Palm 3 (right, largest) -->\n      <div class=\"palm palm-3\">\n        <svg viewBox=\"0 0 170 320\" preserveAspectRatio=\"xMidYMax meet\">\n          <path d=\"M82,320 C84,250 78,180 80,110 C82,70 86,30 88,10\" stroke=\"#020108\" stroke-width=\"6.5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <g stroke=\"#0a0612\" stroke-width=\"1\" opacity=\"0.6\">\n y1=\"170\" x2=\"52\" y2=\"172\"><\u002Fline>\n            <line x1=\"42\" y1=\"140\" x2=\"54\" y2=\"142\"><\u002Fline>\n            <line x1=\"44\" y1=\"110\" x2=\"54\" y2=\"112\"><\u002Fline>\n            <line x1=\"46\" y1=\"80\" x2=\"54\" y2=\"82\"><\u002Fline>\n          <\u002Fg>\n          <g fill=\"#020108\" stroke=\"#020108\" stroke-linejoin=\"round\">\n            <path d=\"M46,10 C28,2 10,6 0,22 C16,14 32,14 44,20 Z\"><\u002Fpath>\n            <path d=\"M46,10 C62,2 84,8 94,26 C78,16 60,16 48,22 Z\"><\u002Fpath>\n            <path d=\"M46,10 C36,16 22,32 14,56 C30,40 42,30 46,24 Z\"><\u002Fpath>\n            <path d=\"M46,10 C58,16 74,34 84,60 C70,44 56,32 48,24 Z\"><\u002Fpath>\n            <path d=\"M46,10 C42,28 38,52 38,76 C44,56 46,38 48,24 Z\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- vignette -->\n  <div class=\"vignette\"><\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n(function() {\n  // ---------- STARFIELD ----------\n  const sf = document.getElementById('starfield');\n  const W = 1600, H = 900;\n  const NS = 'http://www.w3.org/2000/svg';\n  const NUM = 180;\n  for (let i = 0; i < NUM; i++) {\n    const x = Math.random() * W;\n    // Stars get sparser near horizon; bias upward\n    const yPct = Math.pow(Math.random(), 1.6); // 0 (top) bias\n    const y = yPct * H * 0.78; // keep above horizon\n    const r = Math.random() < 0.92 ? Math.random() * 1.1 + 0.3 : Math.random() * 1.8 + 1.2;\n    const o = Math.random() * 0.6 + 0.35;\n    const c = document.createElementNS(NS, 'circle');\n    c.setAttribute('cx', x.toFixed(1));\n    c.setAttribute('cy', y.toFixed(1));\n    c.setAttribute('r', r.toFixed(2));\n    c.setAttribute('class', 'star');\n    c.setAttribute('style',\n      `--o:${o.toFixed(2)};opacity:${o};` +\n      `animation: twinkle ${(2 + Math.random() * 5).toFixed(2)}s ease-in-out ${(Math.random()*4).toFixed(2)}s infinite;`\n    );\n    sf.appendChild(c);\n  }\n  // A couple of brighter \"diamond\" stars\n  for (let i = 0; i < 6; i++) {\n    const x = Math.random() * W;\n    const y = Math.random() * H * 0.5 + 40;\n    const c = document.createElementNS(NS, 'circle');\n    c.setAttribute('cx', x.toFixed(1));\n    c.setAttribute('cy', y.toFixed(1));\n    c.setAttribute('r', 1.6);\n    c.setAttribute('fill', '#fff');\n    c.setAttribute('style', `filter: drop-shadow(0 0 4px rgba(255,255,255,0.9)); animation: twinkle ${(3 + Math.random()*3).toFixed(2)}s ease-in-out infinite;`);\n    sf.appendChild(c);\n  }\n\n  // ---------- BIRDS ----------\n  const birdsRoot = document.getElementById('birds');\n\n  function birdSVG(size) {\n    const svg = `\n      <svg viewBox=\"0 0 36 16\" preserveAspectRatio=\"xMidYMid meet\">\n        <g class=\"wing\">\n          <path d=\"M 1 9 Q 9 1 18 9 Q 27 1 35 9\" />\n        <\u002Fg>\n      <\u002Fsvg>`;\n    return svg;\n  }\n\n  // Create N flocks at varying altitudes, sizes, speeds, delays\n  const flocks = [\n    // {topPct, sizePx, durationS, delayS, count, spreadPx}\n    { top: 14, size: 44, dur: 95, delay:  0,   count: 3, gap: 52, opacity: 0.85, flapDur: 1.6 },\n    { top: 22, size: 32, dur: 130, delay: -28, count: 4, gap: 44, opacity: 0.7,  flapDur: 1.9 },\n    { top: 30, size: 24, dur: 160, delay: -65, count: 2, gap: 36, opacity: 0.55, flapDur: 2.2 },\n    { top: 18, size: 20, dur: 185, delay: -110, count: 3, gap: 32, opacity: 0.45, flapDur: 2.4 },\n    { top: 38, size: 28, dur: 150, delay: -50, count: 2, gap: 40, opacity: 0.5,  flapDur: 2.0 },\n  ];\n\n  flocks.forEach((f, fi) => {\n    for (let i = 0; i < f.count; i++) {\n      const wrap = document.createElement('div');\n      wrap.className = 'bird-flock';\n      // stagger horizontally + slight vertical jitter\n      const jitterY = (Math.random() - 0.5) * 18;\n      const offsetX = -i * f.gap;  // staggered behind leader\n      wrap.style.top = `calc(${f.top}% + ${jitterY}px)`;\n      wrap.style.left = `${offsetX}px`;\n      wrap.style.width = f.size + 'px';\n      wrap.style.height = (f.size * 0.45) + 'px';\n      wrap.style.opacity = f.opacity;\n      wrap.style.animation = `flyAcross ${f.dur}s linear ${f.delay - i * 0.4}s infinite`;\n\n      const bird = document.createElement('div');\n      bird.className = 'bird';\n      bird.innerHTML = birdSVG();\n      // randomize each bird's flap rate slightly\n      const wing = bird.querySelector('.wing');\n      if (wing) {\n        wing.style.animationDuration = (f.flapDur + (Math.random() * 0.4 - 0.2)).toFixed(2) + 's';\n        wing.style.animationDelay = (-Math.random() * 1.5).toFixed(2) + 's';\n      }\n      wrap.appendChild(bird);\n      birdsRoot.appendChild(wrap);\n    }\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
